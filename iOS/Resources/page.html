<html dir="auto">
	<head>
		<title>[[title]]</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
			[[style]]
		</style>
		<script type="text/javascript">
			// Bridges to WebViewController's debugLog message handler, which routes
			// into the same os.Logger stream as the rest of the app's debug output.
			// Raw console.log doesn't show up there on its own.
			function debugLog(message) {
				try {
					window.webkit.messageHandlers.debugLog.postMessage(message);
				} catch (e) {
					// messageHandler not installed (e.g. print preview) -- ignore.
				}
			}

			// Unconditional, runs immediately at parse time (before DOMContentLoaded,
			// before document.body exists) with no dependency on any later event
			// firing correctly. If this line alone doesn't show up in the device
			// log, the debugLog bridge itself isn't wired up (handler not
			// registered on this particular webView instance, or messages are
			// being dropped) and none of the event-based logging below can be
			// trusted until that's fixed first.
			debugLog("page.html script parsed, readyState=" + document.readyState);

			function scrollState(label) {
				return label + ": target=[[windowScrollY]] actualScrollY=" + window.scrollY +
					" scrollHeight=" + document.body.scrollHeight +
					" innerHeight=" + window.innerHeight +
					" bodyLength=" + (document.body.innerHTML ? document.body.innerHTML.length : 0) +
					" readyState=" + document.readyState;
			}

			// Settle-detection restore: reapplies the target scroll position
			// whenever document layout changes (via ResizeObserver on
			// document.body), not just at three fixed lifecycle events, and
			// declares the restore complete only once layout has stopped
			// changing (or a hard cap elapses). Replaces the old fixed
			// three-point (DOMContentLoaded/load/fonts.ready) restore, which
			// could get clamped by an early scrollTo against a not-yet-final
			// document height and never get corrected. See
			// scrollRestoreComplete message handler on the native side.
			var __scrollRestoreSettleTimer = null;
			var __scrollRestoreHardCapTimer = null;
			var __scrollRestoreComplete = false;
			var __scrollRestoreGeneration = [[loadGeneration]];

			function __applyScrollRestore() {
				window.scrollTo(0, [[windowScrollY]]);
			}

			function __finalizeScrollRestore(reason) {
				if (__scrollRestoreComplete) { return; }
				__scrollRestoreComplete = true;
				__applyScrollRestore();
				clearTimeout(__scrollRestoreHardCapTimer);
				debugLog(scrollState("scroll restore settled (" + reason + ")"));
				try {
					window.webkit.messageHandlers.scrollRestoreComplete.postMessage({
						generation: __scrollRestoreGeneration,
						scrollY: window.scrollY,
						scrollHeight: document.body.scrollHeight
					});
				} catch (e) {
					// messageHandler not installed (e.g. print preview) -- ignore.
				}
			}

			function __scheduleSettleCheck() {
				clearTimeout(__scrollRestoreSettleTimer);
				__scrollRestoreSettleTimer = setTimeout(function() {
					__finalizeScrollRestore("quiet-period");
				}, 250);
			}

			document.addEventListener("DOMContentLoaded", function(event) {
				debugLog(scrollState("before DOMContentLoaded restore"));
				__applyScrollRestore();
				debugLog(scrollState("after DOMContentLoaded restore"));
				processPage();

				if (window.ResizeObserver) {
					var __ro = new ResizeObserver(function() {
						__applyScrollRestore();
						__scheduleSettleCheck();
					});
					__ro.observe(document.body);
				}
				__scheduleSettleCheck();

				// Hard cap, scheduled from DOMContentLoaded rather than "load": on a
				// large/image-heavy article, "load" can be delayed well past our
				// intended cap (or effectively never fire promptly if a single image
				// request stalls), which would leave nothing to force completion
				// except the native failsafe -- by then the document may still be
				// short, and native could pick up and persist an unsettled scrollY.
				// DOMContentLoaded fires reliably and early, so anchoring the cap
				// here guarantees completion well before that native failsafe.
				__scrollRestoreHardCapTimer = setTimeout(function() {
					__finalizeScrollRestore("hard-cap");
				}, 3000);
			})

			window.addEventListener("load", function(event) {
				debugLog(scrollState("before load restore"));
				__applyScrollRestore();
				debugLog(scrollState("after load restore"));
				__scheduleSettleCheck();
			})

			if (document.fonts && document.fonts.ready) {
				document.fonts.ready.then(function() {
					debugLog(scrollState("before fonts.ready restore"));
					__applyScrollRestore();
					debugLog(scrollState("after fonts.ready restore"));
					__scheduleSettleCheck();
				});
			}

			// Catches reflows that happen after every restore point above (lazy
			// images, late-inserted content). If this still doesn't match
			// [[windowScrollY]], the content itself is still growing after fonts
			// finish, and needs its own hook (e.g. a MutationObserver or per-image
			// onload) rather than another fixed event.
			window.addEventListener("load", function(event) {
				setTimeout(function() {
					debugLog(scrollState("settle check (+1.5s after load)"));
				}, 1500);
			})

			// Feed-content diagnostic: catches images that fail to load, which is
			// one plausible way a single large document silently comes up short
			// or blank without a WebKit navigation error.
			window.addEventListener("load", function(event) {
				var images = document.querySelectorAll("img");
				var failed = 0;
				images.forEach(function(img) {
					if (!img.complete || img.naturalWidth === 0) {
						failed += 1;
					}
				});
				debugLog("image check: total=" + images.length + " failedOrIncomplete=" + failed);
			})
		</script>
		<base href="[[baseURL]]">
	</head>
	<body>
		[[body]]
	</body>
</html>
