name: Publish AltStore Source

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-source:
    name: Publish source.json
    runs-on: macos-26
    steps:
      - name: Resolve release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            tag_name=$(jq -r '.release.tag_name' "$GITHUB_EVENT_PATH")
            release_id=$(jq -r '.release.id' "$GITHUB_EVENT_PATH")
            published_at=$(jq -r '.release.published_at' "$GITHUB_EVENT_PATH")
            body=$(jq -r '.release.body // ""' "$GITHUB_EVENT_PATH")
          else
            tag_name="${{ inputs.tag }}"
            release_json=$(gh api "repos/${{ github.repository }}/releases/tags/$tag_name")
            release_id=$(echo "$release_json" | jq -r '.id')
            published_at=$(echo "$release_json" | jq -r '.published_at')
            body=$(echo "$release_json" | jq -r '.body // ""')
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "published_at=$published_at" >> "$GITHUB_OUTPUT"
          {
            echo "body<<RELEASE_BODY_EOF"
            echo "$body"
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag_name }}
          path: repo

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Read build settings
        id: settings
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail

          settings=$(xcodebuild -showBuildSettings \
            -project NetNewsWire.xcodeproj \
            -scheme NetNewsWire-iOS \
            -destination "generic/platform=iOS" 2>/dev/null)

          marketing_version=$(echo "$settings" | grep -m1 '^\s*MARKETING_VERSION' | awk -F'= ' '{print $2}')
          current_project_version=$(echo "$settings" | grep -m1 '^\s*CURRENT_PROJECT_VERSION' | awk -F'= ' '{print $2}')
          min_os_version=$(echo "$settings" | grep -m1 '^\s*IPHONEOS_DEPLOYMENT_TARGET' | awk -F'= ' '{print $2}')

          echo "marketing_version=$marketing_version" >> "$GITHUB_OUTPUT"
          echo "build_version=$current_project_version" >> "$GITHUB_OUTPUT"
          echo "min_os_version=$min_os_version" >> "$GITHUB_OUTPUT"

      - name: Find IPA release asset
        id: asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          asset_json=$(gh api "repos/${{ github.repository }}/releases/${{ steps.release.outputs.release_id }}/assets" \
            --jq '[.[] | select(.name | endswith(".ipa"))][0]')

          if [ -z "$asset_json" ] || [ "$asset_json" = "null" ]; then
            echo "No .ipa asset found on release ${{ steps.release.outputs.tag_name }}" >&2
            exit 1
          fi

          download_url=$(echo "$asset_json" | jq -r '.browser_download_url')
          size=$(echo "$asset_json" | jq -r '.size')

          echo "download_url=$download_url" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"

      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: gh-pages
          path: pages

      - name: Initialize gh-pages branch if missing
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d pages ]; then
            mkdir pages
            (cd pages && git init -b gh-pages)
          fi

      - name: Merge new version into source.json
        shell: bash
        env:
          VERSION: ${{ steps.settings.outputs.marketing_version }}
          BUILD_VERSION: ${{ steps.settings.outputs.build_version }}
          RELEASE_DATE: ${{ steps.release.outputs.published_at }}
          RELEASE_NOTES: ${{ steps.release.outputs.body }}
          DOWNLOAD_URL: ${{ steps.asset.outputs.download_url }}
          SIZE_BYTES: ${{ steps.asset.outputs.size }}
          MIN_OS_VERSION: ${{ steps.settings.outputs.min_os_version }}
        run: |
          set -euo pipefail

          existing_arg=""
          if [ -f pages/source.json ]; then
            existing_arg="--existing=pages/source.json"
          fi

          python3 repo/scripts/update_source.py \
            --template=repo/appstore/source.template.json \
            $existing_arg \
            --output=pages/source.json

      - name: Sync icon and screenshots
        shell: bash
        run: |
          set -euo pipefail
          cp repo/appstore/icon.png pages/icon.png
          rm -rf pages/screenshots
          if [ -d repo/appstore/screenshots ] && [ "$(ls -A repo/appstore/screenshots 2>/dev/null)" ]; then
            cp -R repo/appstore/screenshots pages/screenshots
          fi

      - name: Commit and push gh-pages
        working-directory: pages
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" 2>/dev/null || true
          git commit -m "Publish ${{ steps.release.outputs.tag_name }} to source.json"
          git push origin HEAD:gh-pages
