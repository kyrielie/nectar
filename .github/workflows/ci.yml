name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  ios-simulator-build:
    name: iOS Simulator Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Generate Secrets Sources
        run: PROJECT_DIR="$GITHUB_WORKSPACE" ./buildscripts/updateSecrets.sh

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Build for iOS Simulator
        shell: bash
        run: |
          set -euo pipefail

          build_log="${RUNNER_TEMP}/NetNewsWire-iOS-build.log"

          set -o pipefail
          xcodebuild \
            -project NetNewsWire.xcodeproj \
            -scheme NetNewsWire-iOS \
            -xcconfig .github/ios-ci-no-signing.xcconfig \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            OTHER_SWIFT_FLAGS='$(inherited) -DDEBUG -DSKIP_APP_GROUP_ACCESS' \
            build 2>&1 | tee "$build_log" | xcbeautify --renderer github-actions

          ./buildscripts/fail_on_warnings.sh "$build_log"
